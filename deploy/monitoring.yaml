AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudWatch alarms, SNS notifications, and a dashboard for the Flight Delay
  Predictor ALB + Auto Scaling Group. Deploy after the main stack, passing the
  *FullName outputs it exports.

Parameters:
  LoadBalancerFullName:
    Type: String
    Description: e.g. app/my-alb/50dc6c495c0c9188
  TargetGroupFullName:
    Type: String
    Description: e.g. targetgroup/my-tg/73e2d6bc24d8a067
  AlarmEmail:
    Type: String
    Default: ""
    Description: Optional email subscribed to alarm notifications.

Conditions:
  HasEmail: !Not [!Equals [!Ref AlarmEmail, ""]]

Resources:
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: fdp-alarms

  AlarmSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmail
    Properties:
      Protocol: email
      Endpoint: !Ref AlarmEmail
      TopicArn: !Ref AlarmTopic

  High5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: fdp-alb-5xx
      AlarmDescription: Elevated 5xx responses from the API targets.
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_Target_5XX_Count
      Dimensions:
        - { Name: LoadBalancer, Value: !Ref LoadBalancerFullName }
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlarmTopic]

  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: fdp-alb-p95-latency
      AlarmDescription: p95 target response time above 100 ms SLO.
      Namespace: AWS/ApplicationELB
      MetricName: TargetResponseTime
      Dimensions:
        - { Name: LoadBalancer, Value: !Ref LoadBalancerFullName }
      ExtendedStatistic: p95
      Period: 60
      EvaluationPeriods: 5
      Threshold: 0.1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlarmTopic]

  UnhealthyHostsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: fdp-unhealthy-hosts
      AlarmDescription: One or more targets failing health checks.
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Dimensions:
        - { Name: LoadBalancer, Value: !Ref LoadBalancerFullName }
        - { Name: TargetGroup, Value: !Ref TargetGroupFullName }
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlarmTopic]

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: flight-delay-predictor
      DashboardBody: !Sub |
        {
          "widgets": [
            {"type":"metric","x":0,"y":0,"width":12,"height":6,"properties":{
              "title":"Request count","region":"${AWS::Region}","stat":"Sum",
              "metrics":[["AWS/ApplicationELB","RequestCount","LoadBalancer","${LoadBalancerFullName}"]]}},
            {"type":"metric","x":12,"y":0,"width":12,"height":6,"properties":{
              "title":"p95 target latency (s)","region":"${AWS::Region}",
              "metrics":[["AWS/ApplicationELB","TargetResponseTime","LoadBalancer","${LoadBalancerFullName}",{"stat":"p95"}]]}},
            {"type":"metric","x":0,"y":6,"width":12,"height":6,"properties":{
              "title":"5xx responses","region":"${AWS::Region}","stat":"Sum",
              "metrics":[["AWS/ApplicationELB","HTTPCode_Target_5XX_Count","LoadBalancer","${LoadBalancerFullName}"]]}},
            {"type":"metric","x":12,"y":6,"width":12,"height":6,"properties":{
              "title":"Healthy hosts","region":"${AWS::Region}","stat":"Average",
              "metrics":[["AWS/ApplicationELB","HealthyHostCount","LoadBalancer","${LoadBalancerFullName}","TargetGroup","${TargetGroupFullName}"]]}}
          ]
        }

Outputs:
  AlarmTopicArn:
    Value: !Ref AlarmTopic
