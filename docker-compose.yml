services:
  api:
    build: .
    image: flight-delay-predictor:latest
    container_name: fdp-api
    ports:
      - "8000:8000"
    environment:
      FDP_LOG_LEVEL: INFO
      FDP_DECISION_THRESHOLD: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
