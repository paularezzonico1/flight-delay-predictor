name: CD

# Continuous delivery on pushes to main:
#   test -> build image -> push to ECR -> roll out to the ASG behind health checks.
# Authentication to AWS uses OIDC (no long-lived keys); the role ARN and other
# settings come from repository variables/secrets.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPO: ${{ vars.ECR_REPO || 'flight-delay-predictor' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python -m pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image URI
        id: image
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          echo "uri=${REGISTRY}/${ECR_REPO}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t "${{ steps.image.outputs.uri }}" .
          docker push "${{ steps.image.outputs.uri }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # The ASG launch template references the ECR repo with a moving tag; a
      # rolling instance refresh re-pulls the new image. New instances must pass
      # the ALB /health check before old ones are terminated.
      - name: Start ASG instance refresh
        id: refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ vars.ASG_NAME }}" \
            --preferences MinHealthyPercentage=50,InstanceWarmup=90 \
            --query InstanceRefreshId --output text)
          echo "id=$REFRESH_ID" >> "$GITHUB_OUTPUT"
          echo "Started instance refresh $REFRESH_ID"

      - name: Wait for rollout to complete
        run: |
          ASG="${{ vars.ASG_NAME }}"
          ID="${{ steps.refresh.outputs.id }}"
          for _ in $(seq 1 60); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG" \
              --instance-refresh-ids "$ID" \
              --query "InstanceRefreshes[0].Status" --output text)
            echo "Refresh status: $STATUS"
            case "$STATUS" in
              Successful) exit 0 ;;
              Failed|Cancelled) echo "Rollout $STATUS"; exit 1 ;;
            esac
            sleep 30
          done
          echo "Timed out waiting for rollout"; exit 1
