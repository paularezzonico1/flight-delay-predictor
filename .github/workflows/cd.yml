name: CD

# Continuous delivery on pushes to main:
#   test -> build image -> push to ECR -> roll out to the ASG behind health checks.
# Authentication to AWS uses OIDC (no long-lived keys); the role ARN and other
# settings come from repository variables/secrets.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPO: ${{ vars.ECR_REPO || 'flight-delay-predictor' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python -m pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image URI
        id: image
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          echo "uri=${REGISTRY}/${ECR_REPO}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t "${{ steps.image.outputs.uri }}" .
          docker push "${{ steps.image.outputs.uri }}"
